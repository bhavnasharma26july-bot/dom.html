<!DOCTYPE html>
<html>
<head>
  <title>Zoo Rescue Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1fff0;
      padding: 25px;
      padding-top: 70px;
      min-height: 1200px;
    }

    h1, h2 {
      color: #e2d37f;
    }

    h1 {
      text-align: center;
    }

    .alert {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #7fcba9;
      color: white;
      padding: 14px;
      text-align: center;
      font-weight: bold;
    }

    .animal {
      background: #d8f3dc;
      border: 2px solid #466ce8;
      padding: 10px;
      margin: 8px 0;
      width: 220px;
    }

    .moved {
      position: relative;
      left: 35px;
      background: #e67a81;
    }

    .card {
      position: relative;
      background: white;
      border: 2px solid #a3cfbb;
      border-radius: 10px;
      padding: 25px;
      width: 230px;
      text-align: center;
    }

    .tag {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #d6ae82;
      color: white;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .zone {
      position: sticky;
      top: 50px;
      background: #657a70;
      color: white;
      padding: 10px;
      margin-top: 25px;
      font-weight: bold;
    }

    .case {
      background: white;
      border: 2px solid #803eb3;
      padding: 10px;
      margin: 8px 0;
      width: 230px;
      border-radius: 8px;
    }

    code {
      background: #d8f3dc;
      color: #6bebf4;
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
    
<h1 id="re"></h1>
    <button onclick="show()">open the zoo</button>
    <script>
        function show(){
        document.getElementById("re").innerHTML+
        lion+elephant+ant+dog+cat+monkey}
    </script>
    
</body>
</html>
